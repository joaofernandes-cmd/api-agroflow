services:
  - type: web
    name: agroflow
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: APP_URL
        value: https://agroflow-q58k.onrender.com